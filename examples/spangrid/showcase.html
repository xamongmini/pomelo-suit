<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SpanGrid 1.1 Showcase</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f3f6f8;
      --panel: #ffffff;
      --ink: #152033;
      --muted: #657084;
      --line: #d9e0e8;
      --teal: #0f766e;
      --green: #15803d;
      --blue: #2563eb;
      --coral: #e04f3f;
      --amber: #b7791f;
      --plum: #7c3aed;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--page);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 180px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .headline {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .actions a,
    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      text-decoration: none;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--teal);
      color: #fff;
      background: var(--teal);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
    }

    .rail {
      min-height: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 16px;
      overflow: auto;
    }

    .rail h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .rail p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .preset-list {
      display: grid;
      gap: 8px;
      margin: 0 0 18px;
    }

    .preset {
      width: 100%;
      min-height: 54px;
      display: grid;
      grid-template-columns: 8px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      background: #fff;
    }

    .preset.active {
      border-color: var(--teal);
      box-shadow: inset 0 0 0 1px var(--teal);
    }

    .mark {
      width: 8px;
      height: 34px;
      border-radius: 999px;
      background: var(--teal);
    }

    .preset small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .controls {
      display: grid;
      gap: 11px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      color: var(--muted);
      font-weight: 700;
    }

    .field span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      background: #fff;
    }

    .field select {
      min-height: 34px;
      padding: 0 8px;
    }

    .field textarea {
      min-height: 130px;
      padding: 9px;
      resize: vertical;
      font: 11px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .zoom-row {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 8px;
      align-items: center;
    }

    .stage {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      padding: 16px;
      gap: 12px;
    }

    .stage-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .stage-title {
      min-width: 0;
    }

    .stage-title strong {
      display: block;
      font-size: 19px;
    }

    .stage-title span,
    .status {
      color: var(--muted);
      font-size: 12px;
    }

    .grid-shell {
      position: relative;
      min-height: 430px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 18px;
      grid-template-rows: minmax(0, 1fr) 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 16px 40px rgba(18, 32, 51, 0.10);
    }

    canvas {
      grid-column: 1;
      grid-row: 1;
      width: 100%;
      height: 100%;
      display: block;
    }

    .scroll-y {
      grid-column: 2;
      grid-row: 1;
      width: 18px;
      height: 100%;
      writing-mode: vertical-rl;
      direction: rtl;
    }

    .scroll-x {
      grid-column: 1;
      grid-row: 2;
      width: 100%;
      height: 28px;
    }

    .corner {
      grid-column: 2;
      grid-row: 2;
      border-left: 1px solid var(--line);
      border-top: 1px solid var(--line);
      background: #edf2f7;
    }

    .span-grid-html-cell {
      line-height: 1.2;
    }

    .cell-head {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #fff;
      font-weight: 800;
    }

    .badge,
    .delta,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.teal,
    .pill.good,
    .delta.up {
      color: #0f766e;
      background: #ccfbf1;
    }

    .badge.blue,
    .pill.info {
      color: #1d4ed8;
      background: #dbeafe;
    }

    .badge.coral,
    .pill.hot {
      color: #be123c;
      background: #ffe4e6;
    }

    .badge.amber,
    .pill.watch {
      color: #92400e;
      background: #fef3c7;
    }

    .badge.plum {
      color: #6d28d9;
      background: #ede9fe;
    }

    .metric {
      width: 100%;
      display: grid;
      gap: 3px;
    }

    .metric em {
      color: #667085;
      font-style: normal;
      font-size: 11px;
      font-weight: 700;
    }

    .metric strong {
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0;
    }

    .person,
    .product {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar,
    .thumb {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .avatar.teal,
    .thumb.teal {
      background: #0f766e;
    }

    .avatar.blue,
    .thumb.blue {
      background: #2563eb;
    }

    .avatar.coral,
    .thumb.coral {
      background: #e04f3f;
    }

    .avatar.amber,
    .thumb.amber {
      background: #b7791f;
    }

    .avatar.plum,
    .thumb.plum {
      background: #7c3aed;
    }

    .meta {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .meta strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta span {
      color: #667085;
      font-size: 11px;
    }

    .bar {
      width: 100%;
      height: 9px;
      display: block;
      border-radius: 999px;
      background: #e8edf3;
      overflow: hidden;
    }

    .bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--teal);
    }

    .stars {
      color: #b7791f;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .price {
      font-size: 18px;
      font-weight: 900;
    }

    .quote {
      color: #475467;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .rail {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .preset-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar,
      .stage-meta {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">SpanGrid <span id="version">v0.1.0</span></div>
      <div class="headline">Canvas grid performance with per-cell HTML presentation.</div>
      <div class="actions">
        <button id="editCurrent">Edit Current Grid</button>
        <button id="export" class="primary">Export JSON</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="rail">
        <h1>Showcase presets for real product screens</h1>
        <p>Switch between data-heavy layouts that mix regular Canvas cells with HTML-rendered cells.</p>
        <div id="presetList" class="preset-list"></div>

        <div class="controls">
          <label class="field">
            <span>Render mode</span>
            <select id="renderMode">
              <option value="rich">HTML cells</option>
              <option value="plain">Plain cells</option>
            </select>
          </label>

          <label class="field">
            <span>Scroll mode</span>
            <select id="scrollMode">
              <option value="pixel">Pixel</option>
              <option value="cell">Cell snap</option>
            </select>
          </label>

          <label class="check">
            <input id="readonly" type="checkbox">
            <span>Read-only rendering</span>
          </label>

          <label class="field">
            <span>Zoom</span>
            <div class="zoom-row">
              <input id="zoom" type="range" min="70" max="180" step="10" value="100">
              <output id="zoomValue">100%</output>
            </div>
          </label>

          <label class="field">
            <span>Exported JSON</span>
            <textarea id="jsonOut" spellcheck="false"></textarea>
          </label>
        </div>
      </aside>

      <section class="stage">
        <div class="stage-meta">
          <div class="stage-title">
            <strong id="presetTitle">Executive KPI Board</strong>
            <span id="presetSummary">Revenue, risk, retention, and growth metrics in one view.</span>
          </div>
          <div id="status" class="status">Ready</div>
        </div>

        <div class="grid-shell">
          <canvas id="gridCanvas" width="1100" height="620"></canvas>
          <input id="vScroll" class="scroll-y" type="range" min="0" max="0" value="0" aria-label="Vertical scroll">
          <input id="hScroll" class="scroll-x" type="range" min="0" max="0" value="0" aria-label="Horizontal scroll">
          <div class="corner"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="../../packages/spangrid/src/span-grid.js"></script>
  <script>
    const {
      BorderDirection,
      VERSION,
      SpanGridBorder,
      SpanGridCanvasView,
      SpanGridCol,
      SpanGridControl,
      SpanGridFixed,
      SpanGridRow,
    } = window.SpanGrid;

    const SPAN_GRID_SHOWCASE_EDIT_KEY = "SpanGrid.showcase.editSnapshot";
    const canvas = document.getElementById("gridCanvas");
    const hScroll = document.getElementById("hScroll");
    const vScroll = document.getElementById("vScroll");
    const status = document.getElementById("status");
    const presetList = document.getElementById("presetList");
    const presetTitle = document.getElementById("presetTitle");
    const presetSummary = document.getElementById("presetSummary");
    const zoom = document.getElementById("zoom");
    const zoomValue = document.getElementById("zoomValue");
    const scrollMode = document.getElementById("scrollMode");
    const renderMode = document.getElementById("renderMode");
    const readonly = document.getElementById("readonly");
    const jsonOut = document.getElementById("jsonOut");
    const editCurrent = document.getElementById("editCurrent");
    document.getElementById("version").textContent = `v${VERSION}`;

    const accentBorders = new SpanGridBorder({
      color: "#d6dee8",
      borderDirection: BorderDirection.All,
      lineStyle: "Solid",
      lineWidth: 1,
    });

    function makeGrid(widths, heights) {
      const grid = new SpanGridControl({
        width: 1100,
        height: 620,
        borderStyle: "FixedSingle",
        backColor: "#ffffff",
        focusColor: "#e04f3f",
        gridBorder: accentBorders.clone(),
      });
      widths.forEach((width) => grid.addCol(new SpanGridCol({ width })));
      heights.forEach((height) => grid.addRow(new SpanGridRow({ height })));
      grid.fixed = new SpanGridFixed(grid.rows[0], grid.cols[0]);
      grid.layout();
      return grid;
    }

    function stripHtml(html) {
      return String(html).replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
    }

    function setCell(cell, text, options = {}) {
      cell.text = text;
      cell.mode = options.mode || "default";
      cell.tag = {
        html: options.mode === "html" ? text : null,
        plain: options.plain || stripHtml(text),
      };
      cell.backColor = options.backColor || cell.backColor;
      cell.foreColor = options.foreColor || cell.foreColor;
      cell.font = options.font || cell.font;
      cell.textAlign = options.textAlign || cell.textAlign;
      if (options.border) cell.border = options.border;
    }

    function setHeader(grid, labels) {
      labels.forEach((label, col) => {
        const cell = grid.getCell(0, col);
        setCell(cell, `<div class="cell-head"><span>${label}</span></div>`, {
          mode: "html",
          plain: label,
          backColor: "#172033",
          foreColor: "#ffffff",
          font: "800 13px Inter, sans-serif",
          textAlign: "MiddleLeft",
        });
      });
    }

    function applyRenderMode(grid) {
      const rich = renderMode.value === "rich";
      for (const row of grid.rows) {
        for (const cell of row.cells) {
          if (!cell.tag || !cell.tag.html) continue;
          cell.mode = rich ? "html" : "default";
          cell.text = rich ? cell.tag.html : cell.tag.plain;
        }
      }
    }

    function decorateRows(grid) {
      for (let row = 1; row < grid.rows.length; row += 1) {
        for (let col = 0; col < grid.cols.length; col += 1) {
          const cell = grid.getCell(row, col);
          cell.backColor = row % 2 === 0 ? "#f8fafc" : "#ffffff";
          cell.foreColor = "#172033";
        }
      }
    }

    function buildKpi() {
      const grid = makeGrid([170, 170, 170, 180, 180, 220], [38, 72, 72, 72, 72, 72, 72, 72]);
      setHeader(grid, ["Metric", "Current", "Trend", "Owner", "Confidence", "Next action"]);
      decorateRows(grid);
      const rows = [
        ["ARR", "$4.82M", "+18%", "Revenue Ops", 82, "Expand annual plans"],
        ["Pipeline", "$1.34M", "+11%", "Sales", 74, "Review enterprise deals"],
        ["Retention", "96.4%", "+3.1%", "Customer", 91, "Launch renewal playbook"],
        ["Gross margin", "71%", "+2.7%", "Finance", 87, "Reduce support drag"],
        ["NPS", "58", "+9", "Success", 69, "Close feedback loop"],
        ["Activation", "64%", "+6%", "Product", 76, "Simplify first import"],
        ["Risk score", "Low", "-14%", "Ops", 88, "Monitor usage dips"],
      ];
      rows.forEach((row, index) => {
        const r = index + 1;
        setCell(grid.getCell(r, 0), `<div class="metric"><em>North Star</em><strong>${row[0]}</strong></div>`, { mode: "html", plain: row[0], textAlign: "MiddleLeft" });
        setCell(grid.getCell(r, 1), `<div class="metric"><em>Current</em><strong>${row[1]}</strong></div>`, { mode: "html", plain: row[1], textAlign: "MiddleLeft" });
        setCell(grid.getCell(r, 2), `<span class="delta up">${row[2]}</span>`, { mode: "html", plain: row[2] });
        setCell(grid.getCell(r, 3), `<span class="pill info">${row[3]}</span>`, { mode: "html", plain: row[3] });
        setCell(grid.getCell(r, 4), `<span class="bar"><i style="width:${row[4]}%"></i></span>`, { mode: "html", plain: `${row[4]}%` });
        setCell(grid.getCell(r, 5), row[5], { textAlign: "MiddleLeft" });
      });
      return grid;
    }

    function buildCatalog() {
      const grid = makeGrid([230, 135, 150, 120, 120, 180], [38, 68, 68, 68, 68, 68, 68]);
      setHeader(grid, ["Product", "Segment", "Momentum", "Rating", "Price", "Status"]);
      decorateRows(grid);
      const rows = [
        ["Atlas Desk", "Work", "teal", "A modular command desk", 84, "4.8", "$820", "Live"],
        ["North Lamp", "Home", "amber", "Warm focus lighting", 68, "4.6", "$180", "Restock"],
        ["Pulse Dock", "Tech", "blue", "USB-C studio hub", 91, "4.9", "$240", "Hot"],
        ["Field Pack", "Travel", "coral", "All-weather carry kit", 73, "4.7", "$310", "Live"],
        ["Slate Chair", "Office", "plum", "Ergonomic task chair", 79, "4.5", "$560", "Review"],
        ["Muse Board", "Creative", "teal", "Planning surface", 62, "4.4", "$145", "Live"],
      ];
      rows.forEach((row, index) => {
        const r = index + 1;
        setCell(grid.getCell(r, 0), `<div class="product"><span class="thumb ${row[2]}">${row[0].slice(0, 2).toUpperCase()}</span><span class="meta"><strong>${row[0]}</strong><span>${row[3]}</span></span></div>`, { mode: "html", plain: `${row[0]} ${row[3]}`, textAlign: "MiddleLeft" });
        setCell(grid.getCell(r, 1), `<span class="badge ${row[2]}">${row[1]}</span>`, { mode: "html", plain: row[1] });
        setCell(grid.getCell(r, 2), `<span class="bar"><i style="width:${row[4]}%"></i></span>`, { mode: "html", plain: `${row[4]}%` });
        setCell(grid.getCell(r, 3), `<span class="stars">${row[5]}</span>`, { mode: "html", plain: row[5] });
        setCell(grid.getCell(r, 4), `<span class="price">${row[6]}</span>`, { mode: "html", plain: row[6] });
        setCell(grid.getCell(r, 5), `<span class="pill ${row[7] === "Hot" ? "hot" : row[7] === "Restock" ? "watch" : "good"}">${row[7]}</span>`, { mode: "html", plain: row[7] });
      });
      return grid;
    }

    function buildRoadmap() {
      const grid = makeGrid([210, 150, 150, 150, 150, 180], [38, 64, 64, 64, 64, 64, 64]);
      setHeader(grid, ["Initiative", "Q1", "Q2", "Q3", "Q4", "Signal"]);
      decorateRows(grid);
      const rows = [
        ["HTML cells", "Build", "Beta", "Launch", "Scale", "Core"],
        ["Virtualized draw", "Tune", "Ship", "Measure", "Expand", "Performance"],
        ["Designer tools", "Plan", "Build", "Beta", "Launch", "Workflow"],
        ["Theme packs", "Research", "Design", "Ship", "Iterate", "Adoption"],
        ["Data binding", "Spec", "Build", "Launch", "Measure", "Platform"],
        ["Templates", "Draft", "Curate", "Launch", "Promote", "Growth"],
      ];
      rows.forEach((row, index) => {
        const r = index + 1;
        setCell(grid.getCell(r, 0), `<div class="meta"><strong>${row[0]}</strong><span>${row[5]}</span></div>`, { mode: "html", plain: `${row[0]} ${row[5]}`, textAlign: "MiddleLeft" });
        for (let col = 1; col <= 4; col += 1) {
          const cls = row[col] === "Launch" || row[col] === "Ship" ? "good" : row[col] === "Beta" ? "info" : "watch";
          setCell(grid.getCell(r, col), `<span class="pill ${cls}">${row[col]}</span>`, { mode: "html", plain: row[col] });
        }
        setCell(grid.getCell(r, 5), `<span class="badge blue">${row[5]}</span>`, { mode: "html", plain: row[5] });
      });
      return grid;
    }

    function buildTeam() {
      const grid = makeGrid([240, 150, 160, 160, 160, 180], [38, 68, 68, 68, 68, 68, 68]);
      setHeader(grid, ["Member", "Role", "Load", "Focus", "Location", "Status"]);
      decorateRows(grid);
      const rows = [
        ["Mina Park", "Design Lead", "teal", 76, "Editor UX", "Seoul", "Available"],
        ["Jules Kim", "Frontend", "blue", 83, "HTML cells", "Busan", "Deep work"],
        ["Noah Lee", "Product", "amber", 61, "Showcase", "Tokyo", "Review"],
        ["Sara Choi", "QA", "coral", 72, "Regression", "Remote", "Testing"],
        ["Owen Han", "Growth", "plum", 58, "Launch kit", "Singapore", "Planning"],
        ["Yuna Seo", "Support", "teal", 67, "Docs", "Seoul", "Available"],
      ];
      rows.forEach((row, index) => {
        const r = index + 1;
        setCell(grid.getCell(r, 0), `<div class="person"><span class="avatar ${row[2]}">${row[0].split(" ").map((p) => p[0]).join("")}</span><span class="meta"><strong>${row[0]}</strong><span>${row[1]}</span></span></div>`, { mode: "html", plain: `${row[0]} ${row[1]}`, textAlign: "MiddleLeft" });
        setCell(grid.getCell(r, 1), `<span class="badge ${row[2]}">${row[1]}</span>`, { mode: "html", plain: row[1] });
        setCell(grid.getCell(r, 2), `<span class="bar"><i style="width:${row[3]}%"></i></span>`, { mode: "html", plain: `${row[3]}%` });
        setCell(grid.getCell(r, 3), row[4], { textAlign: "MiddleLeft" });
        setCell(grid.getCell(r, 4), row[5]);
        setCell(grid.getCell(r, 5), `<span class="pill ${row[6] === "Available" ? "good" : row[6] === "Testing" ? "hot" : "info"}">${row[6]}</span>`, { mode: "html", plain: row[6] });
      });
      return grid;
    }

    function buildInvoice() {
      const grid = makeGrid([260, 120, 120, 150, 150, 190], [38, 58, 58, 58, 58, 58, 70, 70]);
      setHeader(grid, ["Line item", "Qty", "Unit", "Discount", "Total", "Terms"]);
      decorateRows(grid);
      const rows = [
        ["SpanGrid commercial license", 1, "$2,400", "0%", "$2,400", "Annual"],
        ["Designer preset pack", 2, "$420", "10%", "$756", "Included"],
        ["Integration workshop", 1, "$1,200", "15%", "$1,020", "Remote"],
        ["Priority support", 1, "$680", "0%", "$680", "SLA"],
        ["Launch showcase setup", 1, "$900", "20%", "$720", "One-time"],
      ];
      rows.forEach((row, index) => {
        const r = index + 1;
        setCell(grid.getCell(r, 0), `<div class="meta"><strong>${row[0]}</strong><span>Professional services</span></div>`, { mode: "html", plain: row[0], textAlign: "MiddleLeft" });
        setCell(grid.getCell(r, 1), String(row[1]));
        setCell(grid.getCell(r, 2), row[2]);
        setCell(grid.getCell(r, 3), `<span class="pill watch">${row[3]}</span>`, { mode: "html", plain: row[3] });
        setCell(grid.getCell(r, 4), `<span class="price">${row[4]}</span>`, { mode: "html", plain: row[4] });
        setCell(grid.getCell(r, 5), `<span class="badge teal">${row[5]}</span>`, { mode: "html", plain: row[5] });
      });
      setCell(grid.getCell(6, 0), `<span class="quote">Subtotal</span>`, { mode: "html", plain: "Subtotal", textAlign: "MiddleLeft" });
      setCell(grid.getCell(6, 4), `<span class="price">$5,576</span>`, { mode: "html", plain: "$5,576" });
      setCell(grid.getCell(7, 0), `<div class="metric"><em>Due now</em><strong>$5,576</strong></div>`, { mode: "html", plain: "Due now $5,576", textAlign: "MiddleLeft" });
      grid.mergeCells(7, 0, 7, 3);
      setCell(grid.getCell(7, 4), `<span class="pill good">Ready to send</span>`, { mode: "html", plain: "Ready to send" });
      return grid;
    }

    function buildStatus() {
      const grid = makeGrid([210, 150, 150, 150, 150, 180], [38, 70, 70, 70, 70, 70, 70]);
      setHeader(grid, ["Workstream", "Design", "Build", "Review", "Launch", "Risk"]);
      decorateRows(grid);
      const rows = [
        ["Core renderer", "Done", "Done", "Pass", "Live", "Low"],
        ["HTML overlay", "Done", "Build", "Review", "Next", "Medium"],
        ["Showcase", "Done", "Build", "Review", "Ready", "Low"],
        ["Docs", "Draft", "Build", "Review", "Publish", "Low"],
        ["Examples", "Design", "Build", "Review", "Promote", "Medium"],
        ["QA matrix", "Plan", "Run", "Fix", "Sign off", "Low"],
      ];
      rows.forEach((row, index) => {
        const r = index + 1;
        setCell(grid.getCell(r, 0), `<div class="meta"><strong>${row[0]}</strong><span>Release 1.1</span></div>`, { mode: "html", plain: row[0], textAlign: "MiddleLeft" });
        for (let col = 1; col <= 4; col += 1) {
          const cls = ["Done", "Pass", "Live", "Ready", "Publish", "Sign off"].includes(row[col]) ? "good" : row[col] === "Review" ? "info" : "watch";
          setCell(grid.getCell(r, col), `<span class="pill ${cls}">${row[col]}</span>`, { mode: "html", plain: row[col] });
        }
        setCell(grid.getCell(r, 5), `<span class="pill ${row[5] === "Low" ? "good" : "watch"}">${row[5]}</span>`, { mode: "html", plain: row[5] });
      });
      return grid;
    }

    const presets = [
      { id: "kpi", title: "Executive KPI Board", summary: "Revenue, risk, retention, and growth metrics in one view.", color: "#0f766e", build: buildKpi },
      { id: "catalog", title: "Product Catalog", summary: "Rich product rows with badges, ratings, and pricing.", color: "#e04f3f", build: buildCatalog },
      { id: "roadmap", title: "Project Roadmap", summary: "Quarterly initiatives with compact timeline states.", color: "#2563eb", build: buildRoadmap },
      { id: "team", title: "Team Roster", summary: "People, workload, focus, and availability in one sheet.", color: "#7c3aed", build: buildTeam },
      { id: "invoice", title: "Invoice Quote", summary: "Commercial quote layout with totals and terms.", color: "#b7791f", build: buildInvoice },
      { id: "status", title: "Status Board", summary: "Release readiness matrix for cross-functional teams.", color: "#15803d", build: buildStatus },
    ];

    let activePreset = presets[0];
    let grid = activePreset.build();
    const view = new SpanGridCanvasView(canvas, grid, { hScroll, vScroll, statusElement: status, readonly: readonly.checked });

    function renderPresetButtons() {
      presetList.innerHTML = "";
      presets.forEach((preset) => {
        const button = document.createElement("button");
        button.className = `preset${preset.id === activePreset.id ? " active" : ""}`;
        button.innerHTML = `<span class="mark" style="background:${preset.color}"></span><span><strong>${preset.title}</strong><small>${preset.summary}</small></span>`;
        button.addEventListener("click", () => loadPreset(preset));
        presetList.appendChild(button);
      });
    }

    function loadPreset(preset) {
      activePreset = preset;
      grid = preset.build();
      grid.setZoomPercent(Number(zoom.value));
      grid.setScrollMode(scrollMode.value);
      applyRenderMode(grid);
      view.readonly = readonly.checked;
      view.grid = grid;
      grid.selectCell(0, 0);
      presetTitle.textContent = preset.title;
      presetSummary.textContent = preset.summary;
      status.textContent = "Ready";
      renderPresetButtons();
      view.draw();
    }

    function redraw() {
      grid.setZoomPercent(Number(zoom.value));
      grid.setScrollMode(scrollMode.value);
      zoomValue.textContent = `${grid.getZoomPercent()}%`;
      applyRenderMode(grid);
      view.readonly = readonly.checked;
      view.draw();
    }

    zoom.addEventListener("input", redraw);
    scrollMode.addEventListener("change", redraw);
    renderMode.addEventListener("change", redraw);
    readonly.addEventListener("change", redraw);
    editCurrent.addEventListener("click", () => {
      applyRenderMode(grid);
      const snapshot = {
        source: "showcase",
        presetId: activePreset.id,
        presetTitle: activePreset.title,
        renderMode: renderMode.value,
        grid: grid.toJSON(),
      };
      try {
        sessionStorage.setItem(SPAN_GRID_SHOWCASE_EDIT_KEY, JSON.stringify(snapshot));
        window.location.href = "./index.html?source=showcase";
      } catch (error) {
        jsonOut.value = JSON.stringify(snapshot.grid, null, 2);
        status.textContent = `Editor handoff failed: ${error.message}`;
      }
    });
    document.getElementById("export").addEventListener("click", () => {
      jsonOut.value = JSON.stringify(grid.toJSON(), null, 2);
      status.textContent = "JSON exported";
    });

    renderPresetButtons();
    loadPreset(activePreset);
  </script>
</body>
</html>
